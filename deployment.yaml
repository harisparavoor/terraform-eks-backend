apiVersion: apps/v1

kind: Deployment

metadata:
name: PROJECT_NAME

spec:

replicas: 2

strategy:
type: RollingUpdate

selector:
matchLabels:
app: PROJECT_NAME

template:
  metadata:
  labels:
    app: PROJECT_NAME

  spec:

  containers:
    - name: PROJECT_NAME

      image: IMAGE_URI

      imagePullPolicy: Always

      ports:
        - containerPort: 8080

      readinessProbe:
        httpGet:
          path: /actuator/health
          port: 8080

      livenessProbe:
        httpGet:
          path: /actuator/health
          port: 8080

      resources:
        requests:
          cpu: "200m"
          memory: "512Mi"

        limits:
          cpu: "500m"
          memory: "1Gi"
