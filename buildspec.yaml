version: 0.2

env:
variables:
PROJECT_NAME: backend
CLUSTER_NAME: my-eks
NAMESPACE: default

phases:

install:
runtime-versions:
java: corretto17

commands:
  - curl -LO https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl
  - chmod +x kubectl
  - mv kubectl /usr/local/bin/

pre_build:
  commands:
    - aws ecr get-login-password \
      --region $AWS_DEFAULT_REGION \
      docker login \
      --username AWS \
      --password-stdin \
      $REPOSITORY_URI

    - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)

    - IMAGE_TAG=${COMMIT_HASH:=latest}

    - aws eks update-kubeconfig \
      --name $CLUSTER_NAME \
      --region $AWS_DEFAULT_REGION

build:
  commands:
    - docker build \
      -t $REPOSITORY_URI:$IMAGE_TAG .

    - docker push \
      $REPOSITORY_URI:$IMAGE_TAG

    - sed -i "s|PROJECT_NAME|$PROJECT_NAME|g" deploy/deployment.yaml

    - sed -i "s|IMAGE_URI|$REPOSITORY_URI:$IMAGE_TAG|g" deploy/deployment.yaml

    - sed -i "s|PROJECT_NAME|$PROJECT_NAME|g" deploy/service.yaml

    - sed -i "s|PROJECT_NAME|$PROJECT_NAME|g" deploy/ingress.yaml

post_build:
  commands:
    - kubectl apply -f deploy/

    - kubectl rollout status \
      deployment/$PROJECT_NAME \
      -n $NAMESPACE

artifacts:
files:
  - deploy/**/*
