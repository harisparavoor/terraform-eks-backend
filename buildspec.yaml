version: 0.2

env:
  variables:
    PROJECT_NAME: backend
    NAMESPACE: default

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - curl -LO https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl
      - chmod +x kubectl
      - mv kubectl /usr/local/bin/

  pre_build:
    commands:
      - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$REPOSITORY_URI"
      - IMAGE_TAG=$(echo "$CODEBUILD_RESOLVED_SOURCE_VERSION" | cut -c 1-7)
      - IMAGE_TAG=${IMAGE_TAG:=latest}
      - aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_DEFAULT_REGION"

  build:
    commands:
      - docker build -t "$REPOSITORY_URI:$IMAGE_TAG" .
      - docker push "$REPOSITORY_URI:$IMAGE_TAG"

      - sed -i "s|CLUSTER_NAME|$CLUSTER_NAME|g" aws-load-balancer-controller.yaml
      - sed -i "s|VPC_ID|$VPC_ID|g" aws-load-balancer-controller.yaml
      - sed -i "s|SUBNET_IDS|$SUBNET_IDS|g" aws-load-balancer-controller.yaml
      - sed -i "s|AWS_REGION|$AWS_REGION|g" aws-load-balancer-controller.yaml
      - sed -i "s|ALB_CONTROLLER_ROLE_ARN|$ALB_CONTROLLER_ROLE_ARN|g" aws-load-balancer-controller.yaml

      - mkdir -p rendered
      - cp deployment.yaml service.yaml ingress.yaml rendered/
      - sed -i "s|Backend_App|$Backend_App|g" rendered/deployment.yaml
      - sed -i "s|IMAGE_URI|$REPOSITORY_URI:$IMAGE_TAG|g" rendered/deployment.yaml
      - sed -i "s|Backend_App|$Backend_App|g" rendered/service.yaml
      - sed -i "s|Backend_App|$Backend_App|g;s|Frontend_App|$Frontend_App|g" rendered/ingress.yaml
      - sed -i "s|Backend-App-tg-arn|$Backend-App-tg-arn|g" rendered/backend-targetgroupbinding.yaml

  post_build:
    commands:
      - echo "Deploy to EKS"
      - kubectl apply -f aws-load-balancer-controller.yaml
      - kubectl wait --namespace kube-system --for=condition=ready pod --selector=app.kubernetes.io/name=aws-load-balancer-controller --timeout=300s
      - kubectl get pods -n kube-system -l app.kubernetes.io/name=aws-load-balancer-controller
      - kubectl -n kube-system rollout status deployment aws-load-balancer-controller
      # Check all resources created
      - kubectl get all -n kube-system | grep aws-load-balancer
      - kubectl get crd | grep elbv2
      - kubectl get clusterrole | grep aws-load-balancer
      - kubectl get clusterrolebinding | grep aws-load-balancer

      - kubectl apply -f rendered/deployment.yaml -n "$NAMESPACE"
      - kubectl apply -f rendered/service.yaml -n "$NAMESPACE"
      - kubectl rollout status deployment/"$Backend_App" -n "$NAMESPACE" --timeout=300s

      - kubectl apply -f rendered/ingress.yaml -n "$NAMESPACE"
      - kubectl apply -f rendered/backend-targetgroupbinding.yaml -n "$NAMESPACE"

      - kubectl get pods -n "$NAMESPACE"
      - kubectl get svc -n "$NAMESPACE"
      - kubectl get ingress -n "$NAMESPACE"
      - kubectl get targetgroupbindings -n "$NAMESPACE"

artifacts:
  files:
    - rendered/**/*
